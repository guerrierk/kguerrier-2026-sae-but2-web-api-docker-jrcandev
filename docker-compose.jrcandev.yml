services:
  db:
    container_name: ${NAME}_postgres
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lan

  api:
    container_name: ${NAME}_api
    build: 
      context: ./api
      dockerfile: Dockerfile.jrcandev
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - lan
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.${NAME}_api.entrypoints=websecure"
      - "traefik.http.routers.${NAME}_api.rule=Host(`${NAME}.jrcan.dev`) && PathPrefix(`/api`)"
      - "traefik.http.routers.${NAME}_api.tls=true"
      - "traefik.http.routers.${NAME}_api.tls.certresolver=myresolver"
      - "traefik.http.services.${NAME}_api.loadbalancer.server.port=3070"
      - "traefik.http.routers.${NAME}_api.priority=100"

  web:
    container_name: ${NAME}_web
    build: 
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./web/src:/var/www/html
    depends_on:
      - api
    networks:
      - lan
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.${NAME}_web.entrypoints=websecure"
      - "traefik.http.routers.${NAME}_web.rule=Host(`${NAME}.jrcan.dev`)"
      - "traefik.http.routers.${NAME}_web.tls=true"
      - "traefik.http.routers.${NAME}_web.tls.certresolver=myresolver"
      - "traefik.http.services.${NAME}_web.loadbalancer.server.port=80"
      - "traefik.http.routers.${NAME}_web.priority=1"


  dockge:
      container_name: ${NAME}_dockge
      image: louislam/dockge:1
      restart: unless-stopped
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
        - ./dockge_data:/app/data
        # pour monter uniquement cette stack
        - .:/opt/stacks/${NAME}
      environment:
        - DOCKGE_STACKS_DIR=/opt/stacks
      networks:
        - lan
        - web
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=web"
        - "traefik.http.routers.${NAME}_dockge.entrypoints=websecure"
        - "traefik.http.routers.${NAME}_dockge.rule=Host(`${NAME}.jrcan.dev`) && PathPrefix(`/monitoring`)"
        - "traefik.http.routers.${NAME}_dockge.tls=true"
        - "traefik.http.routers.${NAME}_dockge.tls.certresolver=myresolver"
        - "traefik.http.services.${NAME}_dockge.loadbalancer.server.port=5001"
        - "traefik.http.routers.${NAME}_dockge.priority=90"


volumes:
  postgres_data:
    name: ${NAME}_postgres_data
    
networks:
  web:
    external: true
  lan:
    external: false
    name: lan_${NAME}
